version: '3.8'

services:

  app:
    build: .
    container_name: eai-listing-service
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: eai-mysql
    restart: always
    environment:
      MYSQL_DATABASE: eai_listing_service
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"